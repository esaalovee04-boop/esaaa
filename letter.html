<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebuah Kejutan Spesial Untukmu ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{background:linear-gradient(135deg,#cce7ff,#d6eeff,#c2e8ff);background-size:400% 400%;animation:gradientBackground 15s ease infinite;min-height:100vh;overflow-x:hidden;position:relative}
.container{max-width:800px;margin:0 auto;padding:20px;position:relative;z-index:10;opacity:0;transform:translateY(20px);animation:fadeIn 3s forwards 0.5s}
header{text-align:center;margin-bottom:40px;position:relative}
h1{font-size:2.5rem;color:#0d47a1;margin-bottom:15px;text-shadow:0 0 10px rgba(255,255,255,0.9)}
.letter-container{background:rgba(255,255,255,0.72);border-radius:20px;padding:30px;box-shadow:0 0 20px rgba(25,118,210,0.25);margin-bottom:40px;position:relative;overflow:hidden}
.letter-container::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:20px;box-shadow:inset 0 0 15px rgba(144,202,249,0.5);pointer-events:none;z-index:1}
.letter{font-size:1.2rem;line-height:1.6;color:#333;position:relative;z-index:2;min-height:200px;white-space:pre-line}
.back-button{display:inline-block;margin-top:20px;padding:10px 20px;background:rgba(255,255,255,0.7);border:2px solid #1976d2;color:#1976d2;border-radius:30px;text-decoration:none;font-weight:bold;transition:all 0.3s ease}
.back-button:hover{background:#1976d2;color:white}
.floating-element{position:absolute;pointer-events:none;opacity:0.7;z-index:1;animation-name:float;animation-timing-function:ease-in-out;animation-iteration-count:infinite;animation-direction:alternate}
.cursor-effect{position:absolute;width:15px;height:15px;border-radius:50%;background:rgba(144,202,249,0.7);pointer-events:none;z-index:1000;transform:translate(-50%,-50%);transition:opacity 0.5s ease;opacity:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradientBackground{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-20px) rotate(5deg)}}
@media(max-width:768px){h1{font-size:2rem}.container{padding:15px}.letter-container{padding:20px}.letter{font-size:1rem}.floating-element{max-width:40px;max-height:40px}}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Untuk Kamu, Sayangku 💙</h1>
  </header>
  <div class="letter-container">
    <div class="letter" id="typed-text"></div>
  </div>
  <div class="navigation">
    <a href="javascript:history.back()" class="back-button">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  setTimeout(()=>{document.querySelector('.container').style.opacity=1},500);

  const letterContent="Sayangku esaa,\n\nSaat aku duduk dan merenungkan semua momen yang telah kita lalui bersama, hatiku selalu hangat. Setiap tawa, setiap cerita, setiap keheningan yang nyaman bersamamu — semuanya menjadi bagian dari diriku yang paling berharga.\n\nKamu adalah rumah yang kutemukan tanpa pernah mencarinya. Kamu hadir ketika aku paling rapuh, dan tetap tinggal ketika yang lain pergi. Aku tidak tahu kata apa yang cukup untuk menggambarkan betapa beruntungnya aku memilikimu.\n\nMaafkan aku atas semua yang pernah menyakitimu. Aku ingin kamu tahu — cintaku tidak pernah surut, hanya kadang aku salah cara mengungkapkannya.\n\nKamu layak mendapatkan kebahagiaan yang paling sempurna di dunia ini. Dan aku berjanji, aku akan selalu ada — untuk menjagamu, mencintaimu, dan memelukmu pulang.\n\nDengan seluruh hatiku,\nmarr 💙";

  new Typed('#typed-text',{
    strings:[letterContent],
    typeSpeed:28,
    showCursor:true,
    cursorChar:'|',
    onComplete:function(){}
  });

  const floatingElements=[
    {type:'heart',color:'#42a5f5',size:'20px'},
    {type:'heart',color:'#90caf9',size:'30px'},
    {type:'star',color:'#64b5f6',size:'25px'},
    {type:'star',color:'#bbdefb',size:'15px'},
    {type:'emoji',emoji:'💙',size:'30px'},
    {type:'emoji',emoji:'✨',size:'25px'},
    {type:'emoji',emoji:'🕊️',size:'28px'},
    {type:'heart',color:'#1976d2',size:'22px'},
    {type:'star',color:'#42a5f5',size:'20px'},
    {type:'emoji',emoji:'🌊',size:'25px'}
  ];

  floatingElements.forEach((el,i)=>{
    const div=document.createElement('div');
    div.classList.add('floating-element');
    if(el.emoji){div.textContent=el.emoji;div.style.fontSize=el.size}
    else if(el.type==='heart'){div.innerHTML='<i class="fas fa-heart"></i>';div.style.color=el.color;div.style.fontSize=el.size}
    else if(el.type==='star'){div.innerHTML='<i class="fas fa-star"></i>';div.style.color=el.color;div.style.fontSize=el.size}
    div.style.left=Math.random()*window.innerWidth+'px';
    div.style.top=Math.random()*window.innerHeight+'px';
    div.style.animationDuration=(5+Math.random()*10)+'s';
    div.style.animationDelay=(Math.random()*5)+'s';
    document.body.appendChild(div);
  });

  document.addEventListener('mousemove',function(e){
    const c=document.createElement('div');
    c.classList.add('cursor-effect');
    c.style.left=e.pageX+'px';
    c.style.top=e.pageY+'px';
    document.body.appendChild(c);
    setTimeout(()=>{
      c.style.opacity=1;
      c.style.transform=`translate(-50%,-50%) scale(${Math.random()*0.5+0.5})`;
      setTimeout(()=>{c.style.opacity=0;setTimeout(()=>c.remove(),500)},300);
    },10);
  });
});
</script>
</body>
</html>
